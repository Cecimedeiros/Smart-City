services:

  auth-db:
    image: postgres:15-alpine
    container_name: smartcity_auth_db
    restart: always
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "db_auth" 
    ports:
      - "5432:5432" 
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data 

  demand-db:
    image: postgres:15-alpine
    container_name: smartcity_demand_db
    restart: always
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: "db_demand" 
    ports:
      - "5433:5432" 
    volumes:
      - demand_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartcity_redis
    restart: always
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    container_name: smartcity_auth
    restart: always
    env_file:
      - .env.local
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    command: tail -f /dev/null
    depends_on:
      - auth-db 

  demand-service:
    build: ./demand-service
    container_name: smartcity_demand
    restart: always
    env_file:
      - .env.local
    environment:
      PORT: 3002
    ports:
      - "3002:3002"
    volumes:
      - ./demand-service:/app
      - /app/node_modules
    command: tail -f /dev/null
    depends_on:
      - demand-db 

  metrics-service:
    build: ./metrics-service
    container_name: smartcity_metrics
    restart: always
    env_file:
      - .env.local
    environment:
      PORT: 3003
    ports:
      - "3003:3003"
    volumes:
      - ./metrics-service:/app
      - /app/node_modules
    command: tail -f /dev/null
    depends_on:
      - demand-db 
      - redis

volumes:
  auth_postgres_data: 
  demand_postgres_data: