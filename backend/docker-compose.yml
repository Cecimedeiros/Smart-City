version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: smartcity_db
    restart: always
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartcity_redis
    restart: always
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    container_name: smartcity_auth
    restart: always
    env_file:
      - .env.local
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres-db

  demand-service:
    build: ./demand-service
    container_name: smartcity_demand
    restart: always
    env_file:
      - .env.local
    environment:
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      - postgres-db

  metrics-service:
    build: ./metrics-service
    container_name: smartcity_metrics
    restart: always
    env_file:
      - .env.local
    environment:
      PORT: 3003
    ports:
      - "3003:3003"
    depends_on:
      - postgres-db
      - redis

volumes:
  postgres_data:
